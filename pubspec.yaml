name: ma_logic
description: MA-LOGIC — お手伝いで絆を育む知育アプリ
publish_to: 'none'
version: 2.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  # ステート管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  # ローカルDB
  sqflite: ^2.3.3+2
  path: ^1.9.0
  # 物理演算・アニメーション
  lottie: ^3.1.2
  # ユーティリティ
  uuid: ^4.5.1
  intl: ^0.19.0
  shared_preferences: ^2.3.3
dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.13
flutter:
  uses-material-design: true
